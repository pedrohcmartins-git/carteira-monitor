<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carteira Monitor · Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --accent: #c8f135;
    --text: #e8e8e8;
    --muted: #555;
    --red: #f13560;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(200,241,53,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,241,53,.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events:none;
  }
  .glow {
    position:fixed;
    width:600px; height:600px;
    border-radius:50%;
    background: radial-gradient(circle, rgba(200,241,53,.06) 0%, transparent 70%);
    top:-200px; left:-200px;
    pointer-events:none;
  }
  .card {
    position:relative; z-index:1;
    width:100%; max-width:400px;
    padding:48px 40px;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .logo {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .logo span { color: var(--accent); }
  .subtitle {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 40px;
  }
  .field { margin-bottom: 16px; }
  label {
    display:block;
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  input {
    width:100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 12px 14px;
    outline: none;
    transition: border-color .2s;
  }
  input:focus { border-color: var(--accent); }
  .btn {
    width:100%;
    margin-top: 24px;
    padding: 14px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: .1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .15s;
  }
  .btn:hover { background: #d4f54a; }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .error {
    margin-top:16px;
    font-size:12px;
    color: var(--red);
    display:none;
  }
  .footer {
    margin-top: 32px;
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    letter-spacing: .05em;
  }
</style>
</head>
<body>
<div class="glow"></div>
<div class="card">
  <div class="logo">CARTEIRA<span>.</span>monitor</div>
  <div class="subtitle">Acesso restrito</div>

  <div class="field">
    <label>E-mail</label>
    <input type="email" id="email" placeholder="seu@email.com" autocomplete="email"/>
  </div>
  <div class="field">
    <label>Senha</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
  </div>

  <button class="btn" id="btn-login" onclick="doLogin()">Entrar</button>
  <div class="error" id="error-msg"></div>

  <div id="forgot-link" class="footer" style="cursor:pointer;text-decoration:underline;color:var(--accent)" onclick="showForgot()">Esqueci minha senha</div>
  <div id="forgot-form" style="display:none">
    <div class="field">
      <label>E-mail cadastrado</label>
      <input type="email" id="forgot-email" placeholder="seu@email.com" autocomplete="email"/>
    </div>
    <button class="btn" id="btn-forgot" onclick="doForgot()" style="background:transparent;border:1px solid var(--accent);color:var(--accent)">Enviar link de recuperação</button>
    <div class="error" id="forgot-msg" style="color:var(--accent)"></div>
    <div class="footer" style="cursor:pointer;text-decoration:underline;margin-top:16px" onclick="showLogin()">← Voltar ao login</div>
  </div>
  <div class="footer" style="margin-top:8px">Acesso somente por convite · Contate seu administrador</div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.49.1'
import { SUPABASE_URL, SUPABASE_ANON_KEY } from './config.js'

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
window._sb = sb

window.doLogin = async function() {
  const email = document.getElementById('email').value.trim()
  const password = document.getElementById('password').value
  const btn = document.getElementById('btn-login')
  const err = document.getElementById('error-msg')

  if (!email || !password) {
    err.textContent = 'Preencha e-mail e senha.'; err.style.display='block'; return
  }

  btn.disabled = true
  btn.textContent = 'Entrando...'
  err.style.display = 'none'

  const { error } = await sb.auth.signInWithPassword({ email, password })

  if (error) {
    err.textContent = 'E-mail ou senha incorretos.'
    err.style.display = 'block'
    btn.disabled = false
    btn.textContent = 'Entrar'
  } else {
    window.location.href = './index.html'
  }
}

window.showForgot = function() {
  document.querySelectorAll('.field').forEach(f => f.style.display = 'none')
  document.getElementById('btn-login').style.display = 'none'
  document.getElementById('error-msg').style.display = 'none'
  document.getElementById('forgot-link').style.display = 'none'
  document.getElementById('forgot-form').style.display = 'block'
  document.getElementById('forgot-email').value = document.getElementById('email').value
  document.getElementById('forgot-email').focus()
}

window.showLogin = function() {
  document.querySelectorAll('.field').forEach(f => f.style.display = 'block')
  document.getElementById('btn-login').style.display = 'block'
  document.getElementById('forgot-link').style.display = 'block'
  document.getElementById('forgot-form').style.display = 'none'
}

window.doForgot = async function() {
  const email = document.getElementById('forgot-email').value.trim()
  const btn = document.getElementById('btn-forgot')
  const msg = document.getElementById('forgot-msg')

  if (!email) { msg.textContent = 'Preencha o e-mail.'; msg.style.display = 'block'; return }

  btn.disabled = true
  btn.textContent = 'Enviando…'

  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/auth-callback.html'
  })

  btn.disabled = false
  btn.textContent = 'Enviar link de recuperação'

  if (error) {
    msg.textContent = 'Erro: ' + error.message
    msg.style.color = 'var(--red)'
  } else {
    msg.textContent = 'Link enviado! Verifique seu e-mail (inclusive spam).'
    msg.style.color = 'var(--accent)'
  }
  msg.style.display = 'block'
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') window.doLogin()
})

// Se já logado, redireciona
sb.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = './index.html'
})
</script>
</body>
</html>
