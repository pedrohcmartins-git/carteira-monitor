<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.49.1'
import { SUPABASE_URL, SUPABASE_ANON_KEY } from './config.js'

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { flowType: 'pkce' }
})

async function init() {
  const hash = new URLSearchParams(window.location.hash.substring(1))
  const query = new URLSearchParams(window.location.search)
  
  const accessToken = hash.get('access_token')
  const refreshToken = hash.get('refresh_token')
  const errorCode = hash.get('error_code') || query.get('error_code')

  console.log('hash:', window.location.hash)
  console.log('search:', window.location.search)
  console.log('access_token:', accessToken)
  console.log('error_code:', errorCode)

  if (errorCode) {
    document.getElementById('msg').textContent = 'Link inválido ou expirado. Solicite um novo link de recuperação.'
    document.getElementById('msg').className = 'msg err'
    document.getElementById('msg').style.display = 'block'
    document.getElementById('btn').disabled = true
    return
  }

  if (accessToken) {
    const { error } = await sb.auth.setSession({ 
      access_token: accessToken, 
      refresh_token: refreshToken ?? ''
    })
    if (error) {
      console.log('setSession error:', error.message)
      document.getElementById('msg').textContent = 'Erro ao validar link: ' + error.message
      document.getElementById('msg').className = 'msg err'
      document.getElementById('msg').style.display = 'block'
      document.getElementById('btn').disabled = true
    }
  }
}

init()

window.doReset = async function() {
  const password = document.getElementById('password').value
  const confirm = document.getElementById('confirm').value
  const btn = document.getElementById('btn')
  const msg = document.getElementById('msg')

  if (password.length < 6) {
    msg.textContent = 'A senha deve ter pelo menos 6 caracteres.'
    msg.className = 'msg err'
    msg.style.display = 'block'
    return
  }
  if (password !== confirm) {
    msg.textContent = 'As senhas não coincidem.'
    msg.className = 'msg err'
    msg.style.display = 'block'
    return
  }

  btn.disabled = true
  btn.textContent = 'Salvando...'

  const { error } = await sb.auth.updateUser({ password })

  if (error) {
    msg.textContent = 'Erro: ' + error.message
    msg.className = 'msg err'
    btn.disabled = false
    btn.textContent = 'Salvar senha'
  } else {
    msg.textContent = 'Senha definida! Redirecionando...'
    msg.className = 'msg ok'
    setTimeout(() => window.location.href = './index.html', 2000)
  }
  msg.style.display = 'block'
}
</script>
