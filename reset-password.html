<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carteira Monitor · Nova Senha</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #111111; --border: #1e1e1e;
    --accent: #c8f135; --text: #e8e8e8; --muted: #555;
    --red: #f13560; --green: #35f135;
    --font-display: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font-mono); min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(200,241,53,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,241,53,.025) 1px, transparent 1px);
    background-size: 48px 48px; pointer-events:none;
  }
  .card {
    position:relative; z-index:1;
    width:100%; max-width:400px;
    padding:48px 40px;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .logo { font-family: var(--font-display); font-size:20px; font-weight:800; letter-spacing:-.5px; margin-bottom:8px; }
  .logo span { color: var(--accent); }
  .subtitle { font-size:11px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:40px; }
  .field { margin-bottom:16px; }
  label { display:block; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  input { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); font-family:var(--font-mono); font-size:13px; padding:12px 14px; outline:none; transition:border-color .2s; }
  input:focus { border-color: var(--accent); }
  .btn { width:100%; margin-top:24px; padding:14px; background:var(--accent); color:var(--bg); border:none; font-family:var(--font-mono); font-size:12px; font-weight:500; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; transition:background .15s; }
  .btn:hover { background:#d4f54a; }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .msg { margin-top:16px; font-size:12px; display:none; }
  .msg.ok { color: var(--green); }
  .msg.err { color: var(--red); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">CARTEIRA<span>.</span>monitor</div>
  <div class="subtitle" id="subtitle">Definir nova senha</div>

  <div class="field">
    <label>Nova senha</label>
    <input type="password" id="password" placeholder="Mínimo 6 caracteres"/>
  </div>
  <div class="field">
    <label>Confirmar senha</label>
    <input type="password" id="confirm" placeholder="Repita a senha"/>
  </div>

  <button class="btn" id="btn" onclick="doReset()">Salvar senha</button>
  <div class="msg" id="msg"></div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.49.1'
import { SUPABASE_URL, SUPABASE_ANON_KEY } from './config.js'

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

async function init() {
  const hashParams = new URLSearchParams(window.location.hash.substring(1))
  const accessToken = hashParams.get('access_token')
  const refreshToken = hashParams.get('refresh_token')
  const type = hashParams.get('type')

  console.log('type:', type, 'token presente:', !!accessToken)

  if (accessToken) {
    const { error } = await sb.auth.setSession({ 
      access_token: accessToken, 
      refresh_token: refreshToken ?? ''
    })
    console.log('setSession error:', error?.message)
  }

  const { data: { session } } = await sb.auth.getSession()
  console.log('sessão após init:', session?.user?.id)

  if (!session) {
    document.getElementById('msg').textContent = 'Link inválido ou expirado. Solicite um novo convite.'
    document.getElementById('msg').className = 'msg err'
    document.getElementById('msg').style.display = 'block'
    document.getElementById('btn').disabled = true
  }
}

init()

window.doReset = async function() {
  const password = document.getElementById('password').value
  const confirm = document.getElementById('confirm').value
  const btn = document.getElementById('btn')
  const msg = document.getElementById('msg')

  if (password.length < 6) {
    msg.textContent = 'A senha deve ter pelo menos 6 caracteres.'; msg.className='msg err'; msg.style.display='block'; return
  }
  if (password !== confirm) {
    msg.textContent = 'As senhas não coincidem.'; msg.className='msg err'; msg.style.display='block'; return
  }

  btn.disabled = true; btn.textContent = 'Salvando...'

  const { error } = await sb.auth.updateUser({ password })

  if (error) {
    msg.textContent = 'Erro: ' + error.message; msg.className='msg err'
    btn.disabled = false; btn.textContent = 'Salvar senha'
  } else {
    msg.textContent = 'Senha definida! Redirecionando...'; msg.className='msg ok'
    setTimeout(() => window.location.href = './index.html', 2000)
  }
  msg.style.display = 'block'
}
</script>
</body>
</html>
