<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carteira Monitor · Nova Senha</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #111111; --border: #1e1e1e;
    --accent: #c8f135; --text: #e8e8e8; --muted: #555;
    --red: #f13560; --green: #35f135;
    --font-display: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font-mono); min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(200,241,53,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,241,53,.025) 1px, transparent 1px);
    background-size: 48px 48px; pointer-events:none;
  }
  .card {
    position:relative; z-index:1;
    width:100%; max-width:400px;
    padding:48px 40px;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .logo { font-family: var(--font-display); font-size:20px; font-weight:800; letter-spacing:-.5px; margin-bottom:8px; }
  .logo span { color: var(--accent); }
  .subtitle { font-size:11px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:40px; }
  .field { margin-bottom:16px; }
  label { display:block; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  input { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); font-family:var(--font-mono); font-size:13px; padding:12px 14px; outline:none; transition:border-color .2s; }
  input:focus { border-color: var(--accent); }
  .btn { width:100%; margin-top:24px; padding:14px; background:var(--accent); color:var(--bg); border:none; font-family:var(--font-mono); font-size:12px; font-weight:500; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; transition:background .15s; }
  .btn:hover { background:#d4f54a; }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .msg { margin-top:16px; font-size:12px; display:none; }
  .msg.ok { color: var(--green); }
  .msg.err { color: var(--red); }
  .loading { text-align:center; color:var(--muted); font-size:13px; padding:40px 0; }
  .spinner {
    margin: 0 auto 16px;
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">CARTEIRA<span>.</span>monitor</div>
  <div class="subtitle">Definir nova senha</div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    Verificando sessão…
  </div>

  <div id="form" style="display:none">
    <div class="field">
      <label>Nova senha</label>
      <input type="password" id="password" placeholder="Mínimo 6 caracteres"/>
    </div>
    <div class="field">
      <label>Confirmar senha</label>
      <input type="password" id="confirm" placeholder="Repita a senha"/>
    </div>
    <button class="btn" id="btn" onclick="doReset()">Salvar senha</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.49.1'
import { SUPABASE_URL, SUPABASE_ANON_KEY } from './config.js'

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

const loading = document.getElementById('loading')
const form = document.getElementById('form')
const msg = document.getElementById('msg')

function showError(text) {
  loading.style.display = 'none'
  form.style.display = 'none'
  msg.style.display = 'block'
  msg.className = 'msg err'
  msg.innerHTML = text
}

function showForm() {
  loading.style.display = 'none'
  form.style.display = 'block'
  document.getElementById('password').focus()
}

// ─── Handle tokens arriving directly (fallback if not routed via callback) ───
async function processDirectTokens() {
  const hash = new URLSearchParams(window.location.hash.substring(1))
  const query = new URLSearchParams(window.location.search)
  const errorCode = hash.get('error_code') || query.get('error_code')

  if (errorCode) {
    showError('Link inválido ou expirado. <a href="./login.html">Voltar ao login</a>')
    return false
  }

  const tokenHash = query.get('token_hash')
  const type = query.get('type')
  if (tokenHash && type) {
    const { error } = await sb.auth.verifyOtp({ token_hash: tokenHash, type })
    if (error) { showError('Link expirado. Solicite um novo. <a href="./login.html">Voltar ao login</a>'); return false }
    return true
  }

  const accessToken = hash.get('access_token')
  if (accessToken) {
    const { error } = await sb.auth.setSession({ access_token: accessToken, refresh_token: hash.get('refresh_token') || '' })
    if (error) { showError('Token inválido. Solicite um novo. <a href="./login.html">Voltar ao login</a>'); return false }
    return true
  }

  return null
}

// ─── Init ───
async function init() {
  const tokenResult = await processDirectTokens()
  if (tokenResult === false) return
  if (tokenResult === true) { showForm(); return }

  // No URL tokens — check for existing session (from auth-callback)
  const { data: { session } } = await sb.auth.getSession()
  if (session) { showForm() }
  else { showError('Sessão não encontrada. Use o link enviado por e-mail ou <a href="./login.html">volte ao login</a>.') }
}

// ─── Save password ───
window.doReset = async function() {
  const password = document.getElementById('password').value
  const confirm = document.getElementById('confirm').value
  const btn = document.getElementById('btn')
  msg.style.display = 'none'

  if (password.length < 6) {
    msg.textContent = 'A senha deve ter pelo menos 6 caracteres.'
    msg.className = 'msg err'; msg.style.display = 'block'; return
  }
  if (password !== confirm) {
    msg.textContent = 'As senhas não coincidem.'
    msg.className = 'msg err'; msg.style.display = 'block'; return
  }

  btn.disabled = true; btn.textContent = 'Salvando…'

  const { error } = await sb.auth.updateUser({ password })

  if (error) {
    msg.textContent = 'Erro: ' + error.message
    msg.className = 'msg err'; msg.style.display = 'block'
    btn.disabled = false; btn.textContent = 'Salvar senha'
  } else {
    msg.textContent = 'Senha definida! Redirecionando…'
    msg.className = 'msg ok'; msg.style.display = 'block'
    setTimeout(() => window.location.href = './index.html', 1500)
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && form.style.display !== 'none') window.doReset()
})

init()
</script>
</body>
</html>
